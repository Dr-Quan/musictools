    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
    }

    body {
        background-color: #1e222b;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: #fff;
    }

    /* 實體外殼容器 */
    .metronome-container {
        width: 520px; /* 稍微加寬以容納兩側分列佈局 */
        margin: 40px auto;
        background: linear-gradient(145deg, #2b313f, #1a1d24);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), 
                    inset 0 2px 4px rgba(255,255,255,0.05);
        border: 1px solid #333b4c;
    }

    /* 頂部品牌區 */
    .brand-header {
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2px;
        color: #7f8c8d;
        margin-bottom: 20px;
        text-transform: uppercase;
    }

    /* SVG 容器：純透明的比例定位 */
    .svg-screen-container {
        width: 100%;
        aspect-ratio: 203.92383 / 135.53318; 
        margin-bottom: 28px;
        overflow: hidden;
    }

    /* 讓內嵌的 SVG 完美流式鋪滿 */
    .svg-screen-container svg {
        display: block;
        width: 100% !important;
        height: 100% !important;
    }

    /* 【全新修改】控制面板布局：改為三列式（左按鈕 - 中撥輪 - 右按鈕） */
    .control-panel {
        display: table;
        width: 100%;
        margin-top: 10px;
    }

    /* 左側按鈕列 */
    .left-buttons-cell {
        display: table-cell;
        width: 32%;
        vertical-align: middle;
        padding-right: 12px;
    }

    /* 中間大撥輪列 */
    .center-wheel-cell {
        display: table-cell;
        width: 36%;
        vertical-align: middle;
        text-align: center;
    }

    /* 右側按鈕列 */
    .right-buttons-cell {
        display: table-cell;
        width: 32%;
        vertical-align: middle;
        padding-left: 12px;
    }

    /* 垂直排列的按鈕行 */
    .side-button-row {
        margin-bottom: 12px;
    }
    .side-button-row:last-child {
        margin-bottom: 0;
    }

    /* 實體觸感功能按鍵基礎樣式 */
    .btn {
        display: block;
        width: 100%;
        background: linear-gradient(180deg, #3a4151, #282e3b);
        border: 1px solid #485267;
        color: #e0e6ed;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
        transition: all 0.15s ease;
    }

    .btn:active {
        background: linear-gradient(180deg, #222732, #2d3443);
        box-shadow: 0 1px 2px rgba(0,0,0,0.4), inset 0 1px 3px rgba(0,0,0,0.4);
        transform: translateY(1px);
    }

    /* 左上角 1號播放/暫停圓形按鍵 */
    .btn-play-pause {
        width: 48px;
        height: 48px;
        border-radius: 50% !important;
        background: linear-gradient(180deg, #ff9800, #e65100);
        border-color: #ffb74d;
        padding: 0 !important;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    .btn-play-pause:active {
        background: linear-gradient(180deg, #e65100, #bf360c);
        border-color: #f57c00;
    }

    .btn-play-pause svg {
        width: 36px;
        height: 36px;
        display: block;
    }

    /* 其餘按鍵的膠囊外觀 */
    .btn-capsule {
        border-radius: 20px !important;
        padding: 6px 4px !important;
        max-width: 110px;               /* 💡 可选：限制胶囊的最大宽度，防止两边拉得太长 */
        margin: 0 auto;
    }

    .btn-label {
        display: block;
        font-size: 16px;
        line-height: 1.2;
        opacity: 0.9;
    }

    /* 圓形旋轉撥輪組件 */
    .dial-container {
        display: inline-block;
        position: relative;
        padding: 10px;
        background: #171920;
        border-radius: 50%;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.6), 0 1px 1px rgba(255,255,255,0.05);
    }

    .dial-wheel {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        background: radial-gradient(circle, #3a4151 0%, #1f232b 70%, #15181e 100%);
        border: 2px solid #2d3442;
        box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 2px 3px rgba(255,255,255,0.15);
        cursor: grab;
        position: relative;
        transition: transform 0.05s linear;
    }

    .dial-wheel:active {
        cursor: grabbing;
    }

    /* 撥輪定位綠點 */
    .dial-notch {
        position: absolute;
        width: 4px;
        height: 4px;
        background-color: #00e676;
        border-radius: 50%;
        top: 12px;
        left: 50%;
        margin-left: -2px;
        box-shadow: 0 0 6px #00e676;
    }

    /* 撥輪中心金屬帽 */
    .dial-cap {
        position: absolute;
        width: 50px;
        height: 50px;
        background: radial-gradient(circle, #2d3443 30%, #13161c 100%);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid #3e4758;
        box-shadow: inset 0 1px 2px rgba(255,255,255,0.1);
        display: table;
    }

    .dial-center-text {
        display: table-cell;
        vertical-align: middle;
        text-align: center;
        font-size: 10px;
        color: #7f8c8d;
        font-weight: 600;
    }

    /* ======================================== */
    /* 移動端適配 (僅在屏幕寬度 ≤ 600px 時生效) */
    /* ======================================== */
    @media (max-width: 600px) {
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1e222b;
        }

        .metronome-container {
            width: 100vw;
            max-width: 100vw;
            margin: 0;
            border-radius: 0;
            padding: 16px 12px;
            box-sizing: border-box;
        }
    }
</style>

<script>
// ==========================================================================
// 1. 核心寄存器初始化与 Tone.js 实例化
// ==========================================================================
let registers = {
    beep: 1, tempo: 1, yubei: 0, speak: 1, speed: 100,
    isPlaying: false, workMode: 'metronome',
    // 调音模式专用寄存器
    tunerSubMode: '12-TET',
    tunerMidi: 69,
    tunerIsPlaying: false,
    tunerDetectedCents: null,
    tunerDetectedNoteName: null,
    tunerDetectedOctave: null,
    tunerDetectedIsSharp: false
};

const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const SHARP_INDICES = new Set([1, 3, 6, 8, 10]);

let yubeiCounter = 0;
let currentBeat = 0;

const synth = new Tone.Synth({
    oscillator: { type: "square" },
    envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.05 }
}).toDestination();

const subSynth = new Tone.Synth({
    oscillator: { type: "triangle" },
    envelope: { attack: 0.002, decay: 0.04, sustain: 0, release: 0.04 }
}).toDestination();
subSynth.volume.value = -16;

const tunerOsc = new Tone.Oscillator({ frequency: 440, type: "triangle", volume: -10 }).toDestination();
tunerOsc.stop();

// ==========================================================================
// 2. 映射配置表
// ==========================================================================
const DIGIT_MAP = {
    ' ': [], '-': ['g'],
    '0': ['a','b','c','d','e','f'], '1': ['c','e'], '2': ['a','c','d','f','g'],
    '3': ['a','c','e','f','g'], '4': ['b','c','e','g'], '5': ['a','b','e','f','g'],
    '6': ['a','b','d','e','f','g'], '7': ['a','b','c','e'],
    '8': ['a','b','c','d','e','f','g'], '9': ['a','b','c','e','f','g'],
    'A': ["a0","b0","c0","d0","e0","h0","i0"],
    'B': ["a0","c0","e0","f0","g0","h0","i0","j0"],
    'C': ["a0","b0","d0","f0"],
    'D': ["a0","c0","e0","f0","g0","h0","j0"],
    'E': ["a0","b0","d0","f0","h0","i0"],
    'F': ["a0","b0","d0","h0","i0"],
    'G': ["a0","b0","d0","e0","f0","i0"]
};

const RHYTHM_MAP = {
    1:["note1"],2:["note1","note3","beam1","beam2"],3:["note1","note2","note3","beam1","beam2","triplet"],
    4:["note1","note3","flag1","triplet"],5:["note1","note3","beam4","triplet"],6:["note1","note2","note3","note4","beam1","beam2","beam3","beam4","beam5","beam6"],
    7:["note1","note2","note3","beam1","beam2","beam5"],8:["note1","note2","note3","beam1","beam2","beam4"],9:["point1","note2","note4","beam2","beam3","beam6"],
    10:["point2","note2","note4","beam2","beam3","beam5"],11:["note1","note2","note3","beam4","beam5","beam7","beam10"],12:["note4","rest16th_1","flag3"],
    13:["note4","flag3"],14:["note1","note3","beam1","beam2","beam4","beam5"],15:["note1","note2","note3","beam1","beam2","beam4","beam5","triplet"],
    16:["note1","note3","beam1","beam2","beam5","triplet"],17:["note1","note3","beam1","beam2","beam4","triplet"],18:["note1","note2","note3","note4","beam1","beam2","beam3","beam4","beam5","beam6","beam7","beam8","beam9","beam10","beam11"],
    19:["note1","note2","note3","beam1","beam2","beam4","beam5","beam9","beam10"],20:["note1","note2","note3","beam1","beam2","beam4","beam5","beam7","beam8"],
    21:["point1","note2","note4","beam2","beam3","beam5","beam6","beam11"],22:["point2","note2","note4","beam2","beam3","beam5","beam6","beam9","beam10"],
    23:["note1","note2","note3","beam1","beam2","beam4","beam5","beam7","beam10"],24:["note3","rest16th_1","rest16th_2","flag1","flag2"]
};

const VOICE_MAP = {
    1:["rest4th"],2:["note5"],3:["note5","note6","beam12"],4:["rest8th"],5:["note6","flag4"],6:["note5","note6","beam12","beam13"]
};

const TEMPO_DISPLAY_MAP = {
    1:{left:'-',right:'4',beats:1,isWeakOnly:true},2:{left:'1',right:'4',beats:1},3:{left:'2',right:'4',beats:2},
    4:{left:'3',right:'4',beats:3},5:{left:'4',right:'4',beats:4},6:{left:'3',right:'8',beats:3},7:{left:'6',right:'8',beats:6}
};

const TUNER_SUB_MODE_NOTES = {
    '12-TET': null,
    'guitar': [40,45,50,55,59,64],
    'bass': [28,33,38,43],
    'violin': [55,62,69,76],
    'ukelele': [67,60,64,69]
};

const TUNER_SUB_MODE_LABELS = ['12-TET','guitar','bass','violin','ukelele'];

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
function freqToMidi(freq) { return 12 * (Math.log(freq / 440) / Math.log(2)) + 69; }

// ==========================================================================
// 3. SVG 元素显示/隐藏核心函数
// ==========================================================================
function showElement(id) { const el = document.getElementById(id); if (el) { el.classList.remove('hidden'); } }
function hideElement(id) { const el = document.getElementById(id); if (el) { el.classList.add('hidden'); } }

function renderDigit(groupIndex, char) {
    const segments = ['a','b','c','d','e','f','g'];
    const activeSegs = DIGIT_MAP[char] || [];
    segments.forEach(seg => {
        const id = `${seg}${groupIndex}`;
        if (activeSegs.includes(seg)) showElement(id); else hideElement(id);
    });
}

function renderTuningLetter(letter) {
    const allTuningSegs = ["a0","b0","c0","d0","e0","f0","g0","h0","i0","j0"];
    allTuningSegs.forEach(hideElement);
    const activeSegs = DIGIT_MAP[letter] || [];
    activeSegs.forEach(id => showElement(id));
}

function renderRhythm() {
    const all = new Set();
    Object.values(RHYTHM_MAP).forEach(arr => arr.forEach(id => all.add(id)));
    all.forEach(hideElement);
    const cur = RHYTHM_MAP[registers.beep];
    if (cur) cur.forEach(showElement);
}

function renderVoice() {
    const all = new Set();
    Object.values(VOICE_MAP).forEach(arr => arr.forEach(id => all.add(id)));
    all.forEach(hideElement);
    const cur = VOICE_MAP[registers.speak];
    if (cur) cur.forEach(showElement);
}

// ==========================================================================
// 4. 调音模式UI渲染
// ==========================================================================
function renderTunerUI() {
    // 1. 先清空所有数码管组（防止残留）
    for (let g = 1; g <= 4; g++) {
        ['a','b','c','d','e','f','g'].forEach(seg => hideElement(seg + g));
    }
    // 2. 清空调音字母区域
    ["a0","b0","c0","d0","e0","f0","g0","h0","i0","j0"].forEach(hideElement);
    // 3. 清空升降号
    hideElement('sharp');
    hideElement('flat');

    // 4. 获取当前音高信息
    const noteIndex = ((registers.tunerMidi % 12) + 12) % 12;
    const octave = Math.floor(registers.tunerMidi / 12) - 1;
    const noteLetter = noteStrings[noteIndex][0];
    const isSharp = SHARP_INDICES.has(noteIndex);

    // 5. 点亮字母和数字
    renderTuningLetter(noteLetter);
    renderDigit(4, octave.toString());
    
    // 6. 显示升降号
    if (isSharp) showElement('sharp'); else hideElement('sharp');
    hideElement('flat');

    // 7. 固定显示频率 440 Hz
    const freqStr = "440";
    renderDigit(1, freqStr[0]);
    renderDigit(2, freqStr[1]);
    renderDigit(3, freqStr[2]);
}

function renderTunerBars(cents) {
    for (let i = 1; i <= 23; i++) hideElement(`bar${i}`);
    hideElement('triangle2');

    if (cents === null || isNaN(cents)) return;

    const absCents = Math.abs(cents);
    if (absCents <= 2.5) {
        showElement('bar12');
        showElement('triangle2');
        return;
    }

    const steps = Math.min(10, Math.ceil(absCents / 5));
    if (cents > 0) {
        const startBar = Math.max(2, 12 - steps);
        for (let i = startBar; i <= 12; i++) showElement(`bar${i}`);
    } else {
        const endBar = Math.min(22, 12 + steps);
        for (let i = 12; i <= endBar; i++) showElement(`bar${i}`);
    }
}

function updateTunerDisplayFromDetection() {
    if (registers.tunerDetectedNoteName !== null && registers.tunerDetectedOctave !== null) {
        renderTuningLetter(registers.tunerDetectedNoteName);
        renderDigit(4, registers.tunerDetectedOctave.toString());
        if (registers.tunerDetectedIsSharp) showElement('sharp'); else hideElement('sharp');
        hideElement('flat');

        const fullNoteName = registers.tunerDetectedNoteName + (registers.tunerDetectedIsSharp ? '#' : '');
        const noteIndex = noteStrings.indexOf(fullNoteName);
        const fullMidi = (registers.tunerDetectedOctave + 1) * 12 + (noteIndex >= 0 ? noteIndex : 0);
        const freq = Math.round(midiToFreq(fullMidi >= 0 ? fullMidi : registers.tunerMidi));
        const freqStr = freq.toString();
        if (freqStr.length === 3) {
            renderDigit(1, freqStr[0]); renderDigit(2, freqStr[1]); renderDigit(3, freqStr[2]);
        } else if (freqStr.length === 2) {
            renderDigit(1, ' '); renderDigit(2, freqStr[0]); renderDigit(3, freqStr[1]);
        } else {
            renderDigit(1, ' '); renderDigit(2, ' '); renderDigit(3, freqStr[0]);
        }
    }
    renderTunerBars(registers.tunerDetectedCents);
}

// ==========================================================================
// 5. 调音模式专用：切换子模式
// ==========================================================================
function getTunerNoteList() {
    return TUNER_SUB_MODE_NOTES[registers.tunerSubMode] || null;
}

function clampTunerMidiToSubMode() {
    const list = getTunerNoteList();
    if (!list) {
        if (registers.tunerMidi < 12) registers.tunerMidi = 12;
        if (registers.tunerMidi > 119) registers.tunerMidi = 119;
        return;
    }
    let closest = list[0];
    let minDist = Math.abs(registers.tunerMidi - closest);
    for (const m of list) {
        const d = Math.abs(registers.tunerMidi - m);
        if (d < minDist) { minDist = d; closest = m; }
    }
    registers.tunerMidi = closest;
}

function switchTunerSubMode() {
    const currentIdx = TUNER_SUB_MODE_LABELS.indexOf(registers.tunerSubMode);
    const nextIdx = (currentIdx + 1) % TUNER_SUB_MODE_LABELS.length;
    registers.tunerSubMode = TUNER_SUB_MODE_LABELS[nextIdx];

    TUNER_SUB_MODE_LABELS.forEach(hideElement);
    showElement(registers.tunerSubMode);

    clampTunerMidiToSubMode();
    renderTunerUI();
    if (registers.tunerIsPlaying) {
        tunerOsc.frequency.value = midiToFreq(registers.tunerMidi);
    }
    for (let i = 1; i <= 23; i++) hideElement(`bar${i}`);
    hideElement('triangle2');
}

// ==========================================================================
// 6. YIN 音高检测算法 (耦合SVG)
// ==========================================================================
function createYINDetector(config) {
    config = config || {};
    const threshold = config.threshold || 0.15;
    const sampleRate = config.sampleRate || 44100;
    return function YINDetector(float32AudioBuffer) {
        let rms = 0;
        for (let i = 0; i < float32AudioBuffer.length; i++) { rms += float32AudioBuffer[i] * float32AudioBuffer[i]; }
        rms = Math.sqrt(rms / float32AudioBuffer.length);
        if (rms < 0.005) return null;
        let bufferSize = 2048;
        const yinBufferLength = bufferSize / 2;
        const yinBuffer = new Float32Array(yinBufferLength);
        for (let t = 1; t < yinBufferLength; t++) {
            for (let i = 0; i < yinBufferLength; i++) {
                const delta = float32AudioBuffer[i] - float32AudioBuffer[i + t];
                yinBuffer[t] += delta * delta;
            }
        }
        yinBuffer[0] = 1;
        let runningSum = 0;
        for (let t = 1; t < yinBufferLength; t++) { runningSum += yinBuffer[t]; yinBuffer[t] *= t / (runningSum || 1); }
        let tau = -1;
        for (let t = 2; t < yinBufferLength; t++) {
            if (yinBuffer[t] < threshold) { tau = t; while (tau + 1 < yinBufferLength && yinBuffer[tau + 1] < yinBuffer[tau]) { tau++; } break; }
        }
        if (tau === -1 || tau >= yinBufferLength) return null;
        let betterTau = tau;
        if (tau > 0 && tau < yinBufferLength - 1) {
            const s0 = yinBuffer[tau - 1], s1 = yinBuffer[tau], s2 = yinBuffer[tau + 1];
            const denom = 2 * (2 * s1 - s2 - s0);
            if (Math.abs(denom) > 0.000001) { betterTau = tau + (s2 - s0) / denom; }
        }
        if (betterTau <= 0) return null;
        return sampleRate / betterTau;
    };
}

let tunerAudioCtx = null;
let tunerStream = null;
let tunerAnalyser = null;
let tunerPitchDetector = null;
let tunerAnimationId = null;
const TUNER_BUFLEN = 4096;
const tunerBuf = new Float32Array(TUNER_BUFLEN);

function tunerUpdateLoop() {
    if (registers.workMode !== 'tuner') return;
    if (!tunerAnalyser || !tunerPitchDetector) {
        tunerAnimationId = requestAnimationFrame(tunerUpdateLoop);
        return;
    }
    tunerAnalyser.getFloatTimeDomainData(tunerBuf);
    let frequency = null;
    try { frequency = tunerPitchDetector(tunerBuf); } catch (e) {}
    if (frequency === null || isNaN(frequency) || frequency < 30 || frequency > 2000) {
        registers.tunerDetectedCents = null;
        registers.tunerDetectedNoteName = null;
        registers.tunerDetectedOctave = null;
        registers.tunerDetectedIsSharp = false;
        renderTunerUI();
        for (let i = 1; i <= 23; i++) hideElement(`bar${i}`);
        hideElement('triangle2');
    } else {
        const midiFloat = freqToMidi(frequency);
        const midiRounded = Math.round(midiFloat);
        const octave = Math.floor(midiRounded / 12) - 1;
        const noteIndex = ((midiRounded % 12) + 12) % 12;
        const noteName = noteStrings[noteIndex];
        registers.tunerDetectedNoteName = noteName[0];
        registers.tunerDetectedOctave = octave;
        registers.tunerDetectedIsSharp = SHARP_INDICES.has(noteIndex);
        const targetFreq = midiToFreq(midiRounded);
        let cents = 1200 * Math.log2(frequency / targetFreq);
        cents = Math.round(cents);
        registers.tunerDetectedCents = cents;
        updateTunerDisplayFromDetection();
    }
    tunerAnimationId = requestAnimationFrame(tunerUpdateLoop);
}

async function startMicIfNeeded() {
    if (tunerAudioCtx && tunerAudioCtx.state !== 'closed') return;
    try {
        tunerStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });
        tunerAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (tunerAudioCtx.state === 'suspended') await tunerAudioCtx.resume();
        const source = tunerAudioCtx.createMediaStreamSource(tunerStream);
        tunerAnalyser = tunerAudioCtx.createAnalyser();
        tunerAnalyser.fftSize = TUNER_BUFLEN;
        tunerAnalyser.smoothingTimeConstant = 0.0;
        source.connect(tunerAnalyser);
        tunerPitchDetector = createYINDetector({ sampleRate: tunerAudioCtx.sampleRate, threshold: 0.15 });
    } catch (err) {
        console.warn('麦克风不可用，调音器将仅支持手动参考音播放:', err.message);
        tunerAnalyser = null;
        tunerPitchDetector = null;
    }
}

async function stopMic() {
    if (tunerAnimationId) cancelAnimationFrame(tunerAnimationId);
    tunerAnimationId = null;
    if (tunerStream) { tunerStream.getTracks().forEach(t => t.stop()); tunerStream = null; }
    if (tunerAudioCtx) { await tunerAudioCtx.close(); tunerAudioCtx = null; }
    tunerAnalyser = null;
    tunerPitchDetector = null;
}

// ==========================================================================
// 7. 节拍器UI更新
// ==========================================================================
function updateUI() {
    if (registers.workMode === 'tuner') { renderTunerUI(); return; }
    
    // 1. 在这里把之前隐藏的两个大组元素重新显示出来
    const baseElements = ["pai","paizi","speak","brace","beat_mode","slash", "beat_notes1", "beat_notes2"];
    baseElements.forEach(showElement);
    
    // 2. 下面保持你原本的逻辑不变...
    const speedStr = registers.speed.toString();
    if (registers.speed < 100) { renderDigit(1,' '); renderDigit(2,speedStr[0]); renderDigit(3,speedStr[1]); }
    else { renderDigit(1,speedStr[0]); renderDigit(2,speedStr[1]); renderDigit(3,speedStr[2]); }
    
    const tempoConfig = TEMPO_DISPLAY_MAP[registers.tempo];
    renderDigit(5, tempoConfig.left); renderDigit(6, tempoConfig.right);
    
    if (!registers.isPlaying) {
        if (registers.yubei > 0) { showElement("yubeipai"); renderDigit(4, registers.yubei.toString()); }
        else { hideElement("yubeipai"); renderDigit(4, ' '); }
    }
    
    // 这里会根据当前寄存器值重新点亮具体的音符（比如 note1, beam2 等）
    renderRhythm(); 
    renderVoice();
}

// ==========================================================================
// 8. 节拍器节奏细分
// ==========================================================================
function getRhythmSubOffsets(quarterNoteTimeSeconds) {
    let coreMode = registers.beep;
    if (coreMode > 12) coreMode -= 12;
    const T = quarterNoteTimeSeconds;
    const factor = T / 60;
    switch(coreMode) {
        case 1: return []; case 2: return [30*factor]; case 3: return [20*factor,40*factor];
        case 4: return [40*factor]; case 5: return [20*factor]; case 6: return [15*factor,30*factor,45*factor];
        case 7: return [30*factor,45*factor]; case 8: return [15*factor,30*factor];
        case 9: return [45*factor]; case 10: return [15*factor]; case 11: return [15*factor,45*factor];
        case 12: return [30*factor]; default: return [];
    }
}

// ==========================================================================
// 9. 节拍器柱子动画
// ==========================================================================
function triggerBarAnimation(isStrongBeat) {
    if (registers.workMode !== 'metronome') return;
    const totalBars = 23;
    const targetBarIdx = isStrongBeat ? 1 : 13;
    const intervalTime = (60000 / registers.speed) / 4;
    for (let i = 1; i <= totalBars; i++) hideElement(`bar${i}`);
    let currentStep = totalBars;
    let upTimer = setInterval(() => {
        if (currentStep >= targetBarIdx) { showElement(`bar${currentStep}`); currentStep--; }
        else { clearInterval(upTimer);
            setTimeout(() => {
                let downTimer = setInterval(() => {
                    if (currentStep <= totalBars) { hideElement(`bar${currentStep}`); currentStep++; }
                    else { clearInterval(downTimer); }
                }, intervalTime / (totalBars - targetBarIdx));
            }, intervalTime);
        }
    }, intervalTime / (totalBars - targetBarIdx));
}

// ==========================================================================
// 10. 人声资源预加载
// ==========================================================================
const players = {};
const voiceBuffers = {};
let voiceBuffersReady = false;

async function initPlayers() {
    for (let id in voiceBuffers) {
        players[id] = new Tone.Player({ url: voiceBuffers[id], autostart: false }).toDestination();
    }
}

async function loadVoiceBuffers() {
    const promises = Object.entries(window.AUDIO_BASE64).map(([id, base64]) => {
        return new Promise((resolve) => {
            const buffer = new Tone.Buffer(base64, () => { voiceBuffers[id] = buffer.get(); resolve(); });
        });
    });
    await Promise.all(promises);
    await initPlayers();
    voiceBuffersReady = true;
}

function playVoice(id, time) {
    if (voiceBuffersReady && players[id]) { players[id].start(time); }
}

// ==========================================================================
// 11. 节拍器调度
// ==========================================================================
Tone.Transport.scheduleRepeat((time) => {
    if (registers.workMode !== 'metronome' || !registers.isPlaying) return;
    if (yubeiCounter > 0) {
        synth.volume.value = -12;
        synth.triggerAttackRelease("C5", "32n", time);
        if (registers.speak !== 1 && registers.speak !== 4) { playVoice("tone_0", time); }
        Tone.Draw.schedule(() => { triggerBarAnimation(false); renderDigit(4, yubeiCounter.toString()); yubeiCounter--; }, time);
        return;
    }
    if (yubeiCounter === 0 && registers.yubei > 0) {
        Tone.Draw.schedule(() => { hideElement("yubeipai"); renderDigit(4,' '); registers.yubei=0; }, time);
    }
    const tempoConfig = TEMPO_DISPLAY_MAP[registers.tempo];
    const beatsPerBar = tempoConfig.beats;
    const isStrongBeat = !tempoConfig.isWeakOnly && ((beatsPerBar===1)||(currentBeat===0));
    const quarter = Tone.Time("4n").toSeconds();
    const speakModeMap = {1:0,4:0,2:1,5:1,3:2,6:2};
    const mode = speakModeMap[registers.speak];
    if (mode > 0) {
        const toneId = (tempoConfig.beats===1)?0:Math.min(currentBeat+1,6);
        playVoice("tone_"+toneId, time);
        if (mode===2) { playVoice("tone_0", time+quarter/2); }
    }
    if (registers.beep!==12 && registers.beep!==24) {
        synth.volume.value = isStrongBeat?-8:-12;
        synth.triggerAttackRelease(isStrongBeat?"C6":"C5","32n",time);
    }
    getRhythmSubOffsets(quarter).forEach(offset => { subSynth.triggerAttackRelease("E5","64n",time+offset); });
    Tone.Draw.schedule(() => { triggerBarAnimation(isStrongBeat); }, time);
    currentBeat = (currentBeat+1)%beatsPerBar;
}, "4n");

// ==========================================================================
// 12. 播放器启动与停止控制
// ==========================================================================
async function startMetronome() {
    if (registers.workMode !== 'metronome') return;
    await Tone.start();
    currentBeat = 0;
    yubeiCounter = registers.yubei;
    Tone.Transport.bpm.value = registers.speed;
    Tone.Transport.start();
}

function stopMetronome() {
    Tone.Transport.stop();
    for (let i = 1; i <= 23; i++) hideElement(`bar${i}`);
    updateUI();
}

function toggleTunerPlay() {
    if (registers.workMode !== 'tuner') return;
    registers.tunerIsPlaying = !registers.tunerIsPlaying;
    if (registers.tunerIsPlaying) {
        tunerOsc.frequency.value = midiToFreq(registers.tunerMidi);
        tunerOsc.start();
    } else {
        tunerOsc.stop();
    }
}

// ==========================================================================
// 13. 按钮事件绑定
// ==========================================================================
const dial = document.getElementById('tempoDial');
const btnPlayPause = document.querySelector('.btn-play-pause');
const btnMode = document.querySelectorAll('.left-buttons-cell .btn-capsule')[0];
const btnBeat = document.querySelectorAll('.left-buttons-cell .btn-capsule')[1];
const btnRhythm = document.querySelectorAll('.right-buttons-cell .btn-capsule')[0];
const btnVoice = document.querySelectorAll('.right-buttons-cell .btn-capsule')[1];
const btnCountIn = document.querySelectorAll('.right-buttons-cell .btn-capsule')[2];

function getCurrentDenominator() {
    const tc = TEMPO_DISPLAY_MAP[registers.tempo];
    return tc ? tc.right : '4';
}

function validateAndCorrectRegisters() {
    const denom = getCurrentDenominator();
    if (denom === '4') {
        if (registers.beep<1||registers.beep>12) registers.beep=1;
        if (registers.speak<1||registers.speak>3) registers.speak=1;
    } else if (denom === '8') {
        if (registers.beep<13||registers.beep>24) registers.beep=13;
        if (registers.speak<4||registers.speak>6) registers.speak=4;
    }
}

btnPlayPause.addEventListener('click', async () => {
    if (registers.workMode === 'tuner') { toggleTunerPlay(); return; }
    registers.isPlaying = !registers.isPlaying;
    if (registers.isPlaying) { btnPlayPause.classList.add('active'); await startMetronome(); }
    else { btnPlayPause.classList.remove('active'); stopMetronome(); }
});

// 【重要】模式按钮 - 每次按下完全清空并切换
btnMode.addEventListener('click', async () => {
    // 1. 停止一切播放与音频流
    stopMetronome();
    if (registers.workMode === 'tuner') {
        tunerOsc.stop();
        registers.tunerIsPlaying = false;
        await stopMic();
        if (tunerAnimationId) cancelAnimationFrame(tunerAnimationId);
        tunerAnimationId = null;
    }

    // 2. 翻转工作模式并完全重置寄存器状态
    const nextMode = registers.workMode === 'metronome' ? 'tuner' : 'metronome';
    registers = {
        beep: nextMode === 'metronome' ? 1 : 13, 
        tempo: 1, yubei: 0, speak: nextMode === 'metronome' ? 1 : 4, speed: 100,
        isPlaying: false, workMode: nextMode,
        tunerSubMode: '12-TET', tunerMidi: 69, tunerIsPlaying: false,
        tunerDetectedCents: null, tunerDetectedNoteName: null,
        tunerDetectedOctave: null, tunerDetectedIsSharp: false
    };

    // 3. 【精准清空】补充 beat_notes1 和 beat_notes2 到隐藏列表
    const metronomeSpecificElements = [
        "pai", "paizi", "speak", "brace", "beat_mode", "slash", "yubeipai",
        "beat_notes1", "beat_notes2" // <--- 在这里添加你残留的音符组件ID
    ];
    const tunerSpecificElements = ['A4', 'Hz', 'tone_mode', 'triangle', 'ruler', 'sharp', 'flat', 'triangle2'];
    const tunerSubModes = ['12-TET', 'guitar', 'bass', 'violin', 'ukelele'];

    // 统一隐藏两边的特有元素
    metronomeSpecificElements.forEach(hideElement);
    tunerSpecificElements.forEach(hideElement);
    tunerSubModes.forEach(hideElement);

    // 【额外保险】遍历地图配置表，把所有节奏和人声音符的具体子元素全部隐藏一遍
    Object.values(RHYTHM_MAP).forEach(arr => arr.forEach(hideElement));
    Object.values(VOICE_MAP).forEach(arr => arr.forEach(hideElement));

    // 清空数码管 1~6 组
    for (let g = 1; g <= 6; g++) {
        ['a','b','c','d','e','f','g'].forEach(seg => hideElement(seg + g));
    }
    // 清空专属调音大字母
    ["a0","b0","c0","d0","e0","f0","g0","h0","i0","j0"].forEach(hideElement);
    // 清空指示灯柱
    for (let i = 1; i <= 23; i++) hideElement(`bar${i}`);

    // 4. 根据新模式，执行各自的全新初始化渲染
    if (nextMode === 'tuner') {
        ['A4', 'Hz', 'tone_mode', 'triangle', 'ruler', '12-TET'].forEach(showElement);
        renderTunerUI();
        await startMicIfNeeded();
        tunerUpdateLoop();
    } else {
        validateAndCorrectRegisters();
        updateUI();
    }
});

btnBeat.addEventListener('click', () => {
    if (registers.workMode === 'tuner') { switchTunerSubMode(); return; }
    registers.tempo = registers.tempo >= 7 ? 1 : registers.tempo + 1;
    validateAndCorrectRegisters();
    updateUI();
});

btnRhythm.addEventListener('click', () => {
    if (registers.workMode === 'tuner') return;
    const denom = getCurrentDenominator();
    if (denom==='4') { registers.beep = registers.beep>=12?1:registers.beep+1; }
    else { registers.beep = registers.beep>=24?13:registers.beep+1; }
    updateUI();
});

btnVoice.addEventListener('click', () => {
    if (registers.workMode === 'tuner') return;
    const denom = getCurrentDenominator();
    if (denom==='4') { registers.speak = registers.speak>=3?1:registers.speak+1; }
    else { registers.speak = registers.speak>=6?4:registers.speak+1; }
    updateUI();
});

btnCountIn.addEventListener('click', () => {
    if (registers.workMode === 'tuner' || registers.isPlaying) return;
    registers.yubei = registers.yubei >= 9 ? 0 : registers.yubei + 1;
    updateUI();
});

// ==========================================================================
// 14. 拨轮控制
// ==========================================================================
let currentRotation = 0;
let dialPosition = 0;

function updateDialRotation(newAngle, isDragging = false) {
    const STEP = 15;
    const nextPosition = Math.round(newAngle / STEP) * STEP;
    if (nextPosition !== dialPosition) {
        const stepsChanged = (nextPosition - dialPosition) / STEP;
        if (registers.workMode === 'tuner') {
            const list = getTunerNoteList();
            if (list) {
                const currentIdx = list.indexOf(registers.tunerMidi);
                if (currentIdx >= 0) {
                    const newIdx = Math.max(0, Math.min(list.length-1, currentIdx + stepsChanged));
                    registers.tunerMidi = list[newIdx];
                } else {
                    registers.tunerMidi += stepsChanged;
                    clampTunerMidiToSubMode();
                }
            } else {
                registers.tunerMidi += stepsChanged;
                if (registers.tunerMidi < 12) registers.tunerMidi = 12;
                if (registers.tunerMidi > 119) registers.tunerMidi = 119;
            }
            renderTunerUI();
            for (let i = 1; i <= 23; i++) hideElement(`bar${i}`);
            hideElement('triangle2');
            registers.tunerDetectedCents = null;
            registers.tunerDetectedNoteName = null;
            registers.tunerDetectedOctave = null;
            registers.tunerDetectedIsSharp = false;
            if (registers.tunerIsPlaying) { tunerOsc.frequency.value = midiToFreq(registers.tunerMidi); }
        } else {
            registers.speed += stepsChanged;
            if (registers.speed < 30) registers.speed = 30;
            if (registers.speed > 250) registers.speed = 250;
            updateUI();
            if (registers.isPlaying) { Tone.Transport.bpm.value = registers.speed; }
        }
        dialPosition = nextPosition;
        dial.style.transition = isDragging ? 'none' : 'transform 0.1s ease-out';
        dial.style.transform = `rotate(${dialPosition}deg)`;
    }
}

let isDragging = false;
let lastAngle = 0;
function getAngle(clientX, clientY) {
    const rect = dial.getBoundingClientRect();
    return Math.atan2(clientY-(rect.top+rect.height/2), clientX-(rect.left+rect.width/2))*(180/Math.PI);
}
function handleStart(clientX, clientY) { isDragging=true; lastAngle=getAngle(clientX,clientY); currentRotation=dialPosition; }
function handleMove(clientX, clientY) {
    if (!isDragging) return;
    const currentAngle = getAngle(clientX,clientY);
    let deltaAngle = currentAngle-lastAngle;
    if (deltaAngle>180) deltaAngle-=360; else if (deltaAngle<-180) deltaAngle+=360;
    currentRotation+=deltaAngle;
    updateDialRotation(currentRotation, true);
    lastAngle=currentAngle;
}
dial.addEventListener('wheel', (e) => {
    e.preventDefault();
    let targetAngle = dialPosition + (e.deltaY<0?15:-15);
    updateDialRotation(targetAngle, false);
    currentRotation=dialPosition;
});
dial.addEventListener('mousedown', (e) => handleStart(e.clientX,e.clientY));
window.addEventListener('mousemove', (e) => handleMove(e.clientX,e.clientY));
window.addEventListener('mouseup', () => isDragging=false);
dial.addEventListener('touchstart', (e) => { handleStart(e.touches[0].clientX,e.touches[0].clientY); e.preventDefault(); }, {passive:false});
window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX,e.touches[0].clientY), {passive:false});
window.addEventListener('touchend', () => isDragging=false);

// ==========================================================================
// 15. 启动加载
// ==========================================================================
loadVoiceBuffers();
updateUI();

window.addEventListener('beforeunload', async () => {
    await stopMic();
    if (Tone.Transport) Tone.Transport.stop();
});
</script>
