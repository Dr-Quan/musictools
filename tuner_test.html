<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易调音器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 85%;
            max-width: 400px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #34c759;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        button.active {
            background-color: #ff3b30;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            border: 2px solid #e5e5ea;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #fafafa;
            color: #1c1c1e;
        }
        input#noteOut {
            font-size: 48px;
            height: 80px;
            color: #007aff;
        }
        .status-hint {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 8px;
        }
        .status-hint.on {
            color: #007aff;
        }
        .status-hint.good {
            color: #34c759;
        }
    </style>
</head>
<body>

<div class="container">
    <button id="startBtn">启动麦克风</button>
    <input type="text" id="noteOut" readonly placeholder="点击上方启动">
    <input type="text" id="centsOut" readonly placeholder="+-0 cents">
    <div class="status-hint" id="statusHint">⚡ YIN 算法 + 抛物线插值 (±5 cents)</div>
</div>

<script>
    // ============================================================
    // 修复且优化后的 YIN 音高检测算法
    // ============================================================
    function createYINDetector(config) {
        config = config || {};
        const threshold = config.threshold || 0.15; // 稍微调高容错率
        const sampleRate = config.sampleRate || 44100;
        const probabilityThreshold = config.probabilityThreshold || 0.1;

        return function YINDetector(float32AudioBuffer) {
            // 1. 增加能量检测：如果是绝对静音或噪音过小，直接返回 null
            let rms = 0;
            for (let i = 0; i < float32AudioBuffer.length; i++) {
                rms += float32AudioBuffer[i] * float32AudioBuffer[i];
            }
            rms = Math.sqrt(rms / float32AudioBuffer.length);
            if (rms < 0.005) return null; // 信号太弱，判定为静音

            let bufferSize = 2048; // 固定有效计算窗口，防止过大耗尽性能
            const yinBufferLength = bufferSize / 2;
            const yinBuffer = new Float32Array(yinBufferLength);

            // Step 1: 差分函数 (Difference Function)
            for (let t = 1; t < yinBufferLength; t++) {
                for (let i = 0; i < yinBufferLength; i++) {
                    const delta = float32AudioBuffer[i] - float32AudioBuffer[i + t];
                    yinBuffer[t] += delta * delta;
                }
            }

            // Step 2: 累积均值差分 (Cumulative Mean Normalized Difference)
            yinBuffer[0] = 1;
            let runningSum = 0;
            for (let t = 1; t < yinBufferLength; t++) {
                runningSum += yinBuffer[t];
                yinBuffer[t] *= t / (runningSum || 1); // 防止除以 0
            }

            // Step 3: 绝对阈值选择 (Absolute Threshold)
            let tau = -1;
            for (let t = 2; t < yinBufferLength; t++) {
                if (yinBuffer[t] < threshold) {
                    tau = t;
                    // 寻找局部最小值
                    while (tau + 1 < yinBufferLength && yinBuffer[tau + 1] < yinBuffer[tau]) {
                        tau++;
                    }
                    break;
                }
            }

            // 如果没找到满意的周期，或者周期不合法，返回 null
            if (tau === -1 || tau >= yinBufferLength) return null;

            // Step 4: 抛物线插值精细化音高 (Parabolic Interpolation)
            let betterTau = tau;
            if (tau > 0 && tau < yinBufferLength - 1) {
                const s0 = yinBuffer[tau - 1];
                const s1 = yinBuffer[tau];
                const s2 = yinBuffer[tau + 1];
                const denominator = 2 * (2 * s1 - s2 - s0);
                if (Math.abs(denominator) > 0.000001) {
                    betterTau = tau + (s2 - s0) / denominator;
                }
            }

            if (betterTau <= 0) return null;
            return sampleRate / betterTau;
        };
    }

    // ============================================================
    // UI 控制
    // ============================================================
    const startBtn = document.getElementById('startBtn');
    const noteOut = document.getElementById('noteOut');
    const centsOut = document.getElementById('centsOut');
    const statusHint = document.getElementById('statusHint');

    let audioCtx = null;
    let stream = null;
    let animationId = null;
    let analyser = null;
    const buflen = 4096;
    const buf = new Float32Array(buflen);

    const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    let pitchDetector = null;

    function freqToMidi(freq) {
        return 12 * (Math.log(freq / 440) / Math.log(2)) + 69;
    }

    function midiToFreq(midi) {
        return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function updatePitch() {
        if (!analyser) {
            animationId = requestAnimationFrame(updatePitch);
            return;
        }

        analyser.getFloatTimeDomainData(buf);

        let frequency = null;
        try {
            frequency = pitchDetector(buf);
        } catch (e) {
            console.error(e);
        }

        // 限制人类乐器/人声合理的频率区间 (30Hz - 2000Hz)
        if (frequency === null || isNaN(frequency) || frequency < 30 || frequency > 2000) {
            noteOut.value = "- -";
            centsOut.value = "- -";
            statusHint.textContent = '🎵 等待信号 ...';
            statusHint.className = 'status-hint';
        } else {
            const midiFloat = freqToMidi(frequency);
            const midiRounded = Math.round(midiFloat);

            const octave = Math.floor(midiRounded / 12) - 1;
            const noteIndex = ((midiRounded % 12) + 12) % 12;
            const noteName = noteStrings[noteIndex];

            noteOut.value = `${noteName}${octave}`;

            const targetFreq = midiToFreq(midiRounded);
            let cents = 1200 * Math.log2(frequency / targetFreq);
            cents = Math.round(cents);
            const sign = cents >= 0 ? '+' : '';
            centsOut.value = `${sign}${cents} cents`;

            if (Math.abs(cents) <= 5) {
                statusHint.textContent = '✅ 精准 (±5 cents)';
                statusHint.className = 'status-hint good';
            } else {
                statusHint.textContent = `🎵 偏差 ${cents} cents`;
                statusHint.className = 'status-hint on';
            }
        }

        animationId = requestAnimationFrame(updatePitch);
    }

    startBtn.addEventListener('click', async () => {
        if (audioCtx && audioCtx.state !== 'closed') {
            if (animationId) cancelAnimationFrame(animationId);
            if (stream) stream.getTracks().forEach(track => track.stop());
            await audioCtx.close();
            audioCtx = null;
            stream = null;
            analyser = null;
            pitchDetector = null;

            startBtn.textContent = '启动麦克风';
            startBtn.classList.remove('active');
            noteOut.value = '';
            centsOut.value = '';
            statusHint.textContent = '⚡ YIN 算法 + 抛物线插值 (±5 cents)';
            statusHint.className = 'status-hint';
            return;
        }

        try {
            stream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                }
            });

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            const source = audioCtx.createMediaStreamSource(stream);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = buflen;
            analyser.smoothingTimeConstant = 0.0;
            source.connect(analyser);

            pitchDetector = createYINDetector({
                sampleRate: audioCtx.sampleRate,
                threshold: 0.15
            });

            startBtn.textContent = '停止麦克风';
            startBtn.classList.add('active');
            noteOut.value = '...';
            centsOut.value = '...';
            statusHint.textContent = '🎤 检测中 ...';
            statusHint.className = 'status-hint on';

            if (animationId) cancelAnimationFrame(animationId);
            updatePitch();

        } catch (err) {
            alert(`无法获取麦克风: ${err.message || err}\n请确保使用 HTTPS 或 localhost 并允许权限。`);
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (audioCtx) {
                await audioCtx.close();
                audioCtx = null;
            }
            analyser = null;
            pitchDetector = null;
            startBtn.textContent = '启动麦克风';
            startBtn.classList.remove('active');
        }
    });

    window.addEventListener('beforeunload', async () => {
        if (audioCtx) await audioCtx.close();
        if (stream) stream.getTracks().forEach(track => track.stop());
        if (animationId) cancelAnimationFrame(animationId);
    });
</script>

</body>
</html>
