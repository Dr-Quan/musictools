<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五度圈查询工具</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 靠顶部对齐，彻底消除多余的顶部大空白 */
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            /* 左右留极小边距（5px），让圆圈最大化顶到手机屏幕两边 */
            padding: 15px 5px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 600px; /* 限制最大宽度，在电脑端缩窄时保持精致 */
            width: 100%;
        }

        /* 画布外包裹容器 */
        #canvasWrapper {
            position: relative;
            width: 100%;
            margin: 0 auto 20px auto;
            aspect-ratio: 1 / 1;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvasWrapper:active {
            cursor: grabbing;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none; /* 阻止手机端拖拽圆圈时页面跟着滚动 */
        }

        /* 旋转图层的原点定位在五度圈的中心 (400, 400) */
        #circleLayer {
            transform-origin: 400px 400px;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        /* 按钮容器：允许按钮自动折行缩进 */
        .controls {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 6px;
            padding: 0 5px;
        }

        button {
            background: #252525;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #353535;
            border-color: #666;
        }

        /* 特殊按钮样式 */
        .snap-btn {
            min-width: 48px;
            font-weight: bold;
        }
        .snap-btn:hover {
            background: #007acc;
            border-color: #0099ff;
        }

        .action-btn {
            background: #332211;
            border-color: #553311;
        }
        .action-btn:hover {
            background: #553311;
        }

        #toggleSectors {
            background: #113322;
            border-color: #115533;
        }
        #toggleSectors.active {
            background: #1e663b;
            box-shadow: 0 0 8px rgba(0,255,100,0.3);
        }

        .info {
            font-size: 13px;
            color: #888;
            margin-top: 10px;
            padding: 0 10px;
        }
        #degree text {
            fill: #000000 !important;
            font-family: "微软雅黑", "Source Han Sans", "思源黑体", sans-serif !important;
            font-size: 44px !important;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="snap-btn" data-angle="0">C</button>
        <button class="snap-btn" data-angle="-30">G</button>

        <button class="snap-btn" data-angle="-90">A</button>

        <button class="snap-btn" data-angle="-210">C♯/D♭</button>

        <button class="snap-btn" data-angle="-270">E♭</button>

    <div class="info"><span>🖱️ 鼠标/手指拖拽旋转 · 点击上方调名定位</span></div>

<script>
(function(){
    const circleLayer = document.getElementById('circleLayer');
    const container = document.getElementById('canvasWrapper');
    const sectorLayer = document.getElementById('sectorLayer');
    const toggleSectorsBtn = document.getElementById('toggleSectors');

    let currentAngle = 0;
    let isDragging = false;
    let startTouchAngle = 0;
    let startCircleAngle = 0;

    function setRotation(deg, enableAnimation = true) {
        currentAngle = deg;
        circleLayer.style.transition = enableAnimation ? 'transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1)' : 'none';
        circleLayer.style.transform = `rotate(${deg}deg)`;
    }

    function getAngleFromCenter(clientX, clientY) {
        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const dx = clientX - centerX;
        const dy = clientY - centerY;
        return Math.atan2(dy, dx) * (180 / Math.PI);
    }

    function handleStart(e) {
        if(e.cancelable) e.preventDefault();
        
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if (clientX == null) return;

        isDragging = true;
        startTouchAngle = getAngleFromCenter(clientX, clientY);
        startCircleAngle = currentAngle;
    }

    function handleMove(e) {
        if (!isDragging) return;
        
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if (clientX == null) return;

        const currentTouchAngle = getAngleFromCenter(clientX, clientY);
        const deltaAngle = currentTouchAngle - startTouchAngle;
        
        setRotation(startCircleAngle + deltaAngle, false);
    }

    function handleEnd() {
        if (isDragging) {
            isDragging = false;
            let roundedAngle = Math.round(currentAngle / 30) * 30;
            setRotation(roundedAngle, true);
        }
    }

    container.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    container.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd, { passive: false });

    document.querySelectorAll('.snap-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const angle = parseFloat(this.dataset.angle);
            if (!isNaN(angle)) {
                setRotation(angle, true);
            }
        });
    });

    document.getElementById('resetBtn').addEventListener('click', () => setRotation(0, true));
    document.getElementById('rotateLeft').addEventListener('click', () => setRotation(currentAngle - 30, true));
    document.getElementById('rotateRight').addEventListener('click', () => setRotation(currentAngle + 30, true));

    toggleSectorsBtn.addEventListener('click', function() {
        if (sectorLayer.style.display === 'none') {
            sectorLayer.style.display = 'block';
            this.classList.add('active');
        } else {
            sectorLayer.style.display = 'none';
            this.classList.remove('active');
        }
    });

    setRotation(0, false);

    document.querySelectorAll('svg').forEach(svg => {
        svg.addEventListener('dragstart', (e) => e.preventDefault());
    });
})();
</script>

</body>
